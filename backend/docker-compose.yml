services:
  # PostgreSQL service - commented out, using external NeonDB from .env
  # Uncomment if you want to use local PostgreSQL instead of external database
  # postgres:
  #   image: postgres:17-alpine
  #   container_name: uhq-postgres
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_USER=${POSTGRES_USER:-uhq_user}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-uhq_password}
  #     - POSTGRES_DB=${POSTGRES_DB:-uhq_database}
  #   ports:
  #     - '${POSTGRES_PORT:-5432}:5432'
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
  #   networks:
  #     - uhq-network
  #   healthcheck:
  #     test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-uhq_user} -d ${POSTGRES_DB:-uhq_database}']
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  redis:
    image: redis:8
    container_name: uhq-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-uhq_redis_password}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - uhq-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uhq-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-uhq_redis_password}
      # DATABASE_URL is loaded from .env file (external NeonDB)
    ports:
      - '5001:5000'
    volumes:
      - ./files:/app/files
    depends_on:
      redis:
        condition: service_healthy
      # postgres service removed - using external NeonDB from .env
    networks:
      - uhq-network

volumes:
  # postgres_data:
  #   driver: local
  redis_data:
    driver: local

networks:
  uhq-network:
    name: uhq-network
    external: true
