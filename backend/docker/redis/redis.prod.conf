# Redis Production Configuration File

# Network and Connection Settings
bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 300

# Memory Management - Increase for production
maxmemory 1gb
maxmemory-policy allkeys-lru

# Persistence Settings - More aggressive for production
save 300 1
save 60 100
save 30 1000

# Append Only File (AOF) Settings
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb

# Security Settings - Disable dangerous commands
rename-command CONFIG CONFIG_UHQ_2024_PROD
rename-command SHUTDOWN SHUTDOWN_UHQ_2024_PROD
rename-command DEBUG ""
rename-command FLUSHDB FLUSHDB_UHQ_2024_PROD
rename-command FLUSHALL FLUSHALL_UHQ_2024_PROD
rename-command EVAL ""

# Logging
loglevel warning
logfile "/data/redis.log"

# Performance Settings
databases 16
tcp-backlog 511

# Client Settings
maxclients 20000

# Slow Log Settings
slowlog-log-slower-than 5000
slowlog-max-len 256

# Production optimizations
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
